name: Build PS Vita VPK

on:
  workflow_dispatch:
  push:
    paths:
      - 'vita/**'
      - '.github/workflows/build-vita-vpk.yml'

jobs:
  build-vpk:
    name: Build VPK (VitaSDK)
    runs-on: ubuntu-latest
    container: vitasdk/vitasdk:latest
    steps:
      - name: Install build prerequisites
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq cmake make git
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache cmake make git
          fi
          cmake --version

      - name: Checkout
        uses: actions/checkout@v4

      - name: List SDK stub libraries (diagnostic)
        run: ls /usr/local/vitasdk/arm-vita-eabi/lib/ | grep -iE 'sharedfb|appmgr|vita2d|ctrl|touch' || true

      - name: Configure
        run: cmake -S vita -B vita/build -DCMAKE_BUILD_TYPE=Release

      - name: Build VPK
        run: cmake --build vita/build -- -j"$(nproc)"

      - name: Upload VPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scpcb-ue-vita-vpk
          path: vita/build/*.vpk
          if-no-files-found: error
