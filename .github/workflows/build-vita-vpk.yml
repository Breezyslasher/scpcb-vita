name: Build PS Vita VPK

on:
  workflow_dispatch:
  push:
    paths:
      - 'vita/**'
      - '.github/workflows/build-vita-vpk.yml'

jobs:
  validate-assets:
    name: Validate game assets with port loaders
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build validator
        run: |
          gcc -O2 -Wall -Wextra -o validate_assets \
            vita/tools/validate_assets.c \
            vita/src/formats/rmesh.c \
            vita/src/formats/b3d.c \
            vita/src/formats/texture.c \
            vita/src/render/scene.c \
            vita/src/game/collision.c \
            vita/src/game/mapgen.c \
            vita/src/game/doors.c \
            -lm

      - name: Parse all RMesh rooms, B3D models and referenced textures
        run: ./validate_assets GFX Data

  package-data:
    name: Package device data (manual trigger only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build tools
        run: |
          gcc -O2 -Wall -o convert_assets \
            vita/tools/convert_assets.c vita/src/formats/texture.c -lm
          gcc -O2 -Wall -o validate_assets \
            vita/tools/validate_assets.c \
            vita/src/formats/rmesh.c \
            vita/src/formats/b3d.c \
            vita/src/formats/texture.c \
            vita/src/render/scene.c \
            vita/src/game/collision.c \
            vita/src/game/mapgen.c \
            vita/src/game/doors.c \
            -lm

      - name: Stage device data (world textures capped at 256px)
        run: ./convert_assets staging --cap 256 GFX/Map GFX/NPCs --copy Data SFX GFX

      - name: Validate staged package
        run: cd staging && ../validate_assets GFX Data

      - name: Upload data package
        uses: actions/upload-artifact@v4
        with:
          name: scpcb-ue-vita-data
          path: staging/
          if-no-files-found: error

  build-vpk:
    name: Build VPK (VitaSDK)
    runs-on: ubuntu-latest
    container: vitasdk/vitasdk:latest
    steps:
      - name: Install build prerequisites
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq cmake make git curl unzip
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache cmake make git curl unzip
          fi
          cmake --version

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S vita -B vita/build -DCMAKE_BUILD_TYPE=Release

      - name: Build VPK
        run: cmake --build vita/build -- -j"$(nproc)"

      - name: Upload VPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scpcb-ue-vita-vpk
          path: vita/build/*.vpk
          if-no-files-found: error

      - name: Upload ELF for crash symbolication
        uses: actions/upload-artifact@v4
        with:
          name: scpcb-ue-vita-elf
          path: vita/build/scpcb_ue_vita*
          if-no-files-found: error

      # Prints function/line info for psp2core text-segment offsets
      # listed in vita/tools/crash_offsets.txt (one hex offset per
      # line, relative to segments[0].vaddr from the dump's module
      # info). A first line of "artifact <id>" symbolicates against
      # that earlier run's uploaded ELF instead of this build - the
      # exact binary the crashing device ran. Read the result in this
      # step's log.
      - name: Symbolicate crash offsets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ELF=vita/build/scpcb_ue_vita
          LIST=vita/tools/crash_offsets.txt
          [ -f "$LIST" ] || { echo "no crash_offsets.txt"; exit 0; }
          ART=$(awk '/^artifact /{print $2; exit}' "$LIST")
          if [ -n "$ART" ]; then
            curl -sSL -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ART/zip" \
              -o /tmp/crash-elf.zip
            if unzip -o /tmp/crash-elf.zip -d /tmp/crash-elf; then
              ELF=/tmp/crash-elf/scpcb_ue_vita
              echo "symbolicating against artifact $ART"
            else
              echo "artifact $ART fetch failed; using this build's ELF"
            fi
          fi
          BASE=$(( $(arm-vita-eabi-readelf -l "$ELF" \
                     | awk '/LOAD/{print $3; exit}') ))
          echo "link base: $(printf 0x%x "$BASE")"
          arm-vita-eabi-readelf -l "$ELF" | awk '/LOAD/{print "seg:", $3, $6}'
          grep -v '^artifact ' "$LIST" | while read -r off; do
            [ -n "$off" ] || continue
            addr=$(( BASE + off ))
            echo "== offset $off (addr $(printf 0x%x "$addr")) =="
            arm-vita-eabi-addr2line -f -C -i -e "$ELF" \
              "$(printf 0x%x "$addr")"
          done
