name: Symbolicate crash offsets

# Turns text-segment offsets from a psp2core dump into function/line
# info. Offsets are relative to the module's first text segment vaddr
# (SceKernelModuleInfo segments[0].vaddr in the dump).
on:
  workflow_dispatch:
    inputs:
      offsets:
        description: "Space-separated hex offsets into the text segment"
        required: true
        default: "0xBCF8"

jobs:
  symbolicate:
    name: Build and symbolicate
    runs-on: ubuntu-latest
    container: vitasdk/vitasdk:latest
    steps:
      - name: Install build prerequisites
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq cmake make git
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache cmake make git
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S vita -B vita/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build vita/build -- -j"$(nproc)"

      - name: Symbolicate
        run: |
          ELF=vita/build/scpcb_ue_vita
          BASE=$(arm-vita-eabi-readelf -l "$ELF" | awk '/LOAD/{print strtonum($3); exit}')
          echo "link base: $(printf 0x%x "$BASE")"
          for off in ${{ github.event.inputs.offsets }}; do
            addr=$(( BASE + off ))
            echo "== offset $off (addr $(printf 0x%x "$addr")) =="
            arm-vita-eabi-addr2line -f -C -i -e "$ELF" "$(printf 0x%x "$addr")"
          done
